<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ghosted heading wordmark</title>
  <desc id="desc">Retro-styled Ghosted wordmark with layered gold and orange shadows on a dark panel.</desc>
  <defs>
    <linearGradient id="goldFill" x1="600" y1="32" x2="600" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD84A"/>
      <stop offset="0.52" stop-color="#F6BF1A"/>
      <stop offset="1" stop-color="#D8892A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="220" rx="8" fill="#10141B"/>
  <text x="68" y="168" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="124" font-weight="900" letter-spacing="6" fill="none" stroke="#7F4517" stroke-width="16" paint-order="stroke fill">GHOSTED</text>
  <text x="58" y="158" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="124" font-weight="900" letter-spacing="6" fill="none" stroke="#D46B1F" stroke-width="12" paint-order="stroke fill">GHOSTED</text>
  <text x="48" y="148" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="124" font-weight="900" letter-spacing="6" fill="url(#goldFill)" stroke="#111111" stroke-width="3" paint-order="stroke fill">GHOSTED</text>
  <text x="48" y="148" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="124" font-weight="900" letter-spacing="6" fill="none" stroke="#FFE898" stroke-width="1.5" opacity="0.75">GHOSTED</text>
</svg>
